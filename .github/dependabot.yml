version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      storybook:
        patterns:
          - storybook
          - '@storybook/*'
          - '@chromatic-com/storybook'
      testing:
        patterns:
          - vitest
          - '@vitest/*'
          - '@playwright/test'
          - '@testing-library/*'
          - jsdom
      build:
        patterns:
          - tsdown
          - typescript

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
