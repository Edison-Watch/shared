name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run build

      - if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/coverage-summary.json
          retention-days: 1
